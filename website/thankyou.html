<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Elleden Hotel (K) Limited</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        .thankyou-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #8B7355, #6B5344);
            padding: 40px 20px;
        }
        .thankyou-card {
            background: white;
            padding: 60px 50px;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .thankyou-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #28a745, #20c997);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        .thankyou-icon i {
            font-size: 3rem;
            color: white;
        }
        .thankyou-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 15px;
        }
        .thankyou-card p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }
        .thankyou-card .contact-info {
            background: #f8f5f2;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .thankyou-card .contact-info p {
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .thankyou-card .contact-info a {
            color: #8B7355;
            font-weight: 500;
        }
        .thankyou-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .thankyou-buttons .btn {
            padding: 14px 30px;
        }
    </style>
</head>
<body>
    <section class="thankyou-section">
        <div class="thankyou-card">
            <div class="thankyou-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1>Thank You!</h1>
            <p>Your message has been sent successfully. Our team at Elleden Hotel will get back to you within 24 hours.</p>
            
            <div class="contact-info">
                <p><strong>Need immediate assistance?</strong></p>
                <p><i class="fas fa-phone"></i> <a href="tel:+254759435880">+254 759 435 880</a></p>
                <p><i class="fab fa-whatsapp"></i> <a href="https://wa.me/254759435880">Chat on WhatsApp</a></p>
            </div>
            
            <div class="thankyou-buttons">
                <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
                <a href="rooms.html" class="btn btn-outline" style="border-color: #8B7355; color: #8B7355;">View Rooms</a>
            </div>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
